<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アストロ・ハーベスターズ：スターダスト</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --panel-bg: #1a1f29;
            --planet-color: #5d9cec;
            --gold: #ffce54;
        }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; position: relative; }
        
        #particles-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .particle { position: absolute; background: #fff; border-radius: 50%; opacity: 0; animation: twinkle linear infinite; box-shadow: 0 0 8px rgba(255, 255, 255, 0.8); }
        @keyframes twinkle { 
            0% { opacity: 0; transform: translateY(0) scale(0.5); } 
            50% { opacity: 0.6; transform: translateY(-50px) scale(1.2); } 
            100% { opacity: 0; transform: translateY(-100px) scale(0.5); } 
        }

        #header { text-align: center; padding: 15px; width: 100%; background: linear-gradient(180deg, #161b22 0%, transparent 100%); flex-shrink: 0; z-index: 10; box-sizing: border-box; }
        #resource-display { font-size: 2.8rem; font-weight: bold; color: var(--accent-color); text-shadow: 0 0 15px rgba(0, 212, 255, 0.6); }
        .status-panel { background: rgba(255,255,255,0.05); padding: 5px 20px; border-radius: 20px; display: inline-block; margin-top: 5px; }

        #main-container { display: flex; width: 95%; max-width: 1100px; gap: 20px; flex: 1; min-height: 0; margin-bottom: 20px; z-index: 5; }
        #view-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; }

        #planet-container { position: relative; cursor: pointer; transition: transform 0.1s; z-index: 5; }
        #planet-container:active { transform: scale(0.95); }
        #planet-visual { width: 250px; height: 250px; background: radial-gradient(circle at 30% 30%, var(--planet-color), #000); border-radius: 50%; box-shadow: 0 0 60px rgba(0, 212, 255, 0.2); transition: all 1s ease; }
        #planet-name { margin-top: 20px; font-size: 1.5rem; font-weight: bold; color: var(--gold); z-index: 5; }

        #alien-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 1; }
        .alien { position: absolute; font-size: 2rem; transition: top 3s ease-in-out, left 3s ease-in-out; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }

        .golden-ufo { position: absolute; font-size: 3.5rem; cursor: pointer; z-index: 150; filter: drop-shadow(0 0 20px var(--gold)); animation: flyAcross 6s linear forwards; user-select: none; }
        .golden-ufo:hover { transform: scale(1.1); filter: drop-shadow(0 0 30px #fff); }
        @keyframes flyAcross { 0% { transform: translateX(-150px) translateY(0); opacity: 0; } 10% { opacity: 1; } 50% { transform: translateX(calc(50vw - 200px)) translateY(-100px); } 90% { opacity: 1; } 100% { transform: translateX(100vw) translateY(50px); opacity: 0; } }

        .button-group { display: flex; gap: 10px; margin-top: 20px; z-index: 5; flex-wrap: wrap; justify-content: center; }
        .action-btn { padding: 10px 15px; color: #fff; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; border: none; }
        
        #btn-archive { background: #243b55; border: 1px solid var(--accent-color); }
        #btn-archive:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 15px var(--accent-color); }

        #btn-achievements { background: #2c3e50; border: 1px solid var(--gold); }
        #btn-achievements:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        #btn-alien { background: #4a148c; border: 1px solid #d500f9; }
        #btn-alien:hover:not(:disabled) { background: #d500f9; box-shadow: 0 0 15px #d500f9; }
        #btn-alien:disabled { opacity: 0.4; cursor: not-allowed; }

        #btn-settings { background: #34495e; border: 1px solid #7f8c8d; }
        #btn-settings:hover { background: #7f8c8d; color: #fff; box-shadow: 0 0 15px #7f8c8d; }

        #btn-prestige { background: #d35400; border: 1px solid #f39c12; width: 100%; }
        #btn-prestige:hover:not(:disabled) { background: #f39c12; box-shadow: 0 0 15px #f39c12; }
        #btn-prestige:disabled { opacity: 0.4; cursor: not-allowed; display: none; }

        #shop-area { width: 380px; height: 100%; overflow-y: auto; background-color: var(--panel-bg); border-radius: 15px; padding: 15px 15px 50px 15px; border-left: 2px solid #343b47; box-sizing: border-box; position: relative; z-index: 5; }
        #shop-area::-webkit-scrollbar { width: 8px; }
        #shop-area::-webkit-scrollbar-track { background: #1a1f29; border-radius: 4px; }
        #shop-area::-webkit-scrollbar-thumb { background: #343b47; border-radius: 4px; }
        
        .item-card { background: #252d3a; padding: 12px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; border: 1px solid #343b47; position: relative; overflow: hidden; }
        .item-card:hover { background: #2e3848; }
        .item-card.disabled { opacity: 0.4; cursor: not-allowed; }
        .item-info { display: flex; justify-content: space-between; align-items: center; }
        .item-name { font-weight: bold; font-size: 1rem; }
        .item-count { font-size: 1.2rem; color: var(--accent-color); font-weight: bold; }
        .item-cost { color: var(--gold); font-size: 0.9rem; display: block; font-weight: bold;}
        .item-desc { font-size: 0.75rem; color: #888; display: flex; justify-content: space-between; align-items: center; margin-top: 3px; }
        .item-milestone { font-size: 0.8rem; color: var(--gold); letter-spacing: 2px; }

        .floating-text { position: absolute; color: #fff; font-weight: bold; pointer-events: none; animation: floatUp 1s forwards; z-index: 200; text-shadow: 0 0 5px #000; }
        .jackpot-text { color: var(--gold); font-size: 2rem; animation: floatUpJackpot 1.5s forwards; text-shadow: 0 0 20px var(--gold), 0 0 5px #000; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
        @keyframes floatUpJackpot { 0% { transform: translateY(0) scale(1); opacity: 1; } 50% { transform: translateY(-80px) scale(1.2); opacity: 1; } 100% { transform: translateY(-150px) scale(1); opacity: 0; } }

        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 400; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: linear-gradient(135deg, #f1c40f 0%, #d35400 100%); color: #fff; padding: 15px 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 15px; animation: slideIn 0.5s ease-out forwards, fadeOut 0.5s ease-in 4s forwards; font-weight: bold; border: 2px solid #fff; }
        .toast-icon { font-size: 2rem; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 300; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        #modal-content { background: #1a1f29; width: 80%; max-width: 600px; max-height: 80vh; border-radius: 15px; border: 2px solid var(--accent-color); padding: 20px; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #fff; font-size: 1.5rem; cursor: pointer; }
        
        .lore-entry { margin-bottom: 15px; padding: 15px; background: #252d3a; border-left: 4px solid #5d9cec; border-radius: 4px; }
        .lore-entry h4 { margin: 0 0 5px 0; color: var(--gold); }
        .lore-entry p { margin: 0; font-size: 0.9rem; line-height: 1.4; color: #ddd; }
        .lore-locked { opacity: 0.3; border-left-color: #333; text-align: center; font-style: italic; }

        .ach-entry { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; padding: 15px; background: #252d3a; border: 1px solid #444; border-radius: 8px; }
        .ach-entry.unlocked { border-color: var(--gold); box-shadow: inset 0 0 10px rgba(255, 206, 84, 0.2); }
        .ach-icon { font-size: 2.5rem; filter: grayscale(100%); opacity: 0.3; min-width: 50px; text-align: center; }
        .ach-entry.unlocked .ach-icon { filter: none; opacity: 1; }
        .ach-info h4 { margin: 0 0 5px 0; color: #fff; }
        .ach-entry.unlocked .ach-info h4 { color: var(--gold); }
        .ach-info p { margin: 0; font-size: 0.85rem; color: #aaa; }

        @media (max-width: 768px) {
            #header { padding: 8px; }
            #resource-display { font-size: 2rem; }
            .status-panel { font-size: 0.8rem; padding: 5px 10px; }
            #main-container { flex-direction: column; gap: 5px; margin-bottom: 5px; }
            #view-area { flex: none; height: auto; padding-top: 5px; padding-bottom: 5px; overflow: visible; }
            #planet-visual { width: 130px; height: 130px; }
            #planet-name { margin-top: 5px; font-size: 1.1rem; }
            #shop-area { width: 100%; flex: 1; border-left: none; border-top: 2px solid #343b47; border-radius: 0 0 15px 15px; padding: 10px 10px 60px 10px; }
            .button-group { margin-top: 5px; gap: 5px; }
            .action-btn { padding: 6px 8px; font-size: 0.75rem; }
            .golden-ufo { font-size: 2.5rem; }
            #modal-content { width: 95%; padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="particles-container"></div>

    <div id="header">
        <h1 style="margin: 0 0 5px 0; font-size: 1.2rem; color: #aaa;">ASTRO HARVESTERS</h1>
        <div id="resource-display">0</div>
        <div class="status-panel">
            SPS: <span id="sps-display" style="color:var(--accent-color)">0</span>
            <span id="bonus-display" style="margin-left: 10px; color: #d500f9; font-size: 0.8rem;"></span>
            <span id="prestige-display" style="margin-left: 10px; color: #f39c12; font-size: 0.8rem; font-weight: bold;"></span>
        </div>
    </div>

    <div id="main-container">
        <div id="view-area">
            <div id="alien-container"></div>
            <div id="planet-container" onclick="clickPlanet(event)">
                <div id="planet-visual"></div>
            </div>
            <div id="planet-name">初期化された岩石惑星</div>
            <p style="font-size: 0.75rem; color: #666; z-index: 5; margin: 2px 0;">タップで資源を採取</p>
            
            <div class="button-group">
                <button class="action-btn" id="btn-archive" onclick="openModal('archive')">🌌 歴史</button>
                <button class="action-btn" id="btn-achievements" onclick="openModal('achievements')">🏆 実績</button>
                <button class="action-btn" id="btn-settings" onclick="openModal('settings')">⚙️ 設定/引継ぎ</button>
                <button class="action-btn" id="btn-alien" onclick="hireAlien()">👾 宇宙人を雇う</button>
                <button class="action-btn" id="btn-prestige" onclick="prestigeJump()">🚀 次の惑星へ移住</button>
            </div>
        </div>

        <div id="shop-area">
            <h3 style="margin-top:0; font-size: 1.1rem;">銀河開発メニュー</h3>
            <div id="shop-items"></div>
        </div>
    </div>

    <div id="toast-container"></div>

    <div id="modal-overlay">
        <div id="modal-content">
            <span class="close-btn" onclick="closeModal()">×</span>
            <h2 id="modal-title" style="color: var(--accent-color); margin-top:0; font-size: 1.3rem;"></h2>
            <div id="modal-list"></div>
        </div>
    </div>

    <script>
        // --- オーディオシステム ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            else if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        document.addEventListener('pointerdown', initAudio, { once: true });
        document.addEventListener('keydown', initAudio, { once: true });

        function playSound(type) {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'tap') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gainNode.gain.setValueAtTime(0.08, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'buy') {
                osc.type = 'square'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(554.37, now + 0.05); osc.frequency.setValueAtTime(659.25, now + 0.1);
                gainNode.gain.setValueAtTime(0.04, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'ufoSpawn') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(300, now); osc.frequency.linearRampToValueAtTime(800, now + 1.5); osc.frequency.linearRampToValueAtTime(200, now + 3);
                gainNode.gain.setValueAtTime(0, now); gainNode.gain.linearRampToValueAtTime(0.05, now + 0.5); gainNode.gain.linearRampToValueAtTime(0, now + 3);
                osc.start(now); osc.stop(now + 3);
            } else if (type === 'ufoTap') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, now); osc.frequency.setValueAtTime(1108.73, now + 0.1); osc.frequency.setValueAtTime(1318.51, now + 0.2); osc.frequency.setValueAtTime(1760, now + 0.3);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            }
        }

        // --- ユーティリティ関数 ---
        function formatNumber(num) {
            if (num < 1000) return Math.floor(num).toString();
            const suffixes = ["", "k", "m", "b", "t", "qa", "qi", "sx", "sp", "o", "n", "d"];
            const tier = Math.floor(Math.log10(num) / 3);
            if (tier >= suffixes.length) return num.toExponential(2).replace('e+', 'e'); 
            const suffix = suffixes[tier];
            const scale = Math.pow(10, tier * 3);
            return parseFloat((num / scale).toFixed(2)) + suffix;
        }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            let str = "";
            if (h > 0) str += `${h}時間 `;
            if (m > 0) str += `${m}分 `;
            str += `${s}秒`;
            return str;
        }

        let gameState = {
            stardust: 0, currentEvoLevel: 0, aliens: 0, alienCost: 500, planetLevel: 1, unlockedAchievements: [],
            lastSaveTime: Date.now(), // ★オフライン計算用の最終セーブ時刻を追加
            items: [
                { id: 0, name: "採掘ドローン", baseCost: 15, cost: 15, sps: 2, count: 0 },
                { id: 1, name: "酸素精製プラント", baseCost: 100, cost: 100, sps: 12, count: 0 },
                { id: 2, name: "地熱発電所", baseCost: 1100, cost: 1100, sps: 68, count: 0 },
                { id: 3, name: "軌道エレベーター", baseCost: 12000, cost: 12000, sps: 375, count: 0 },
                { id: 4, name: "反物質リアクター", baseCost: 130000, cost: 130000, sps: 2400, count: 0 },
                { id: 5, name: "銀河貿易センター", baseCost: 1400000, cost: 1400000, sps: 18000, count: 0 },
                { id: 6, name: "ダイソン球", baseCost: 15000000, cost: 15000000, sps: 142500, count: 0 },
                { id: 7, name: "人工ブラックホール", baseCost: 200000000, cost: 200000000, sps: 1200000, count: 0 },
                { id: 8, name: "銀河系シミュレーター", baseCost: 5000000000, cost: 5000000000, sps: 35000000, count: 0 }, 
                { id: 9, name: "多次元エネルギー抽出機", baseCost: 150000000000, cost: 150000000000, sps: 1200000000, count: 0 }, 
                { id: 10, name: "宇宙創生エンジン", baseCost: 8000000000000, cost: 8000000000000, sps: 75000000000, count: 0 },
                { id: 11, name: "多世界干渉アレイ", baseCost: 400000000000000, cost: 400000000000000, sps: 5000000000000, count: 0 },
                { id: 12, name: "アカシック・マニピュレーター", baseCost: 25000000000000000, cost: 25000000000000000, sps: 400000000000000, count: 0 },
                { id: 13, name: "事象の超越者（オメガ）", baseCost: 999000000000000000, cost: 999000000000000000, sps: 20000000000000000, count: 0 },
                { id: 14, name: "宇宙樹（ユグドラシル）", baseCost: 5000000000000000000, cost: 5000000000000000000, sps: 100000000000000000, count: 0 }, 
                { id: 15, name: "次元統合コライダー", baseCost: 800000000000000000000, cost: 800000000000000000000, sps: 20000000000000000000, count: 0 }, 
                { id: 16, name: "真理の到達者（アルファ）", baseCost: 100000000000000000000000, cost: 100000000000000000000000, sps: 5000000000000000000000, count: 0 } 
            ]
        };

        const alienEmojis = ["👾", "👽", "🤖", "🐙", "🛸", "🚀", "🧑‍🚀", "👁️"];
        const itemIcons = ["⛏️", "💨", "🌋", "🗼", "⚛️", "🏢", "☀️", "🕳️", "🌌", "💠", "🎇", "📡", "👁️", "👑", "🌳", "🧬", "♾️"];
        const milestones = [1, 10, 50, 100];
        
        let achievementsList = [
            { id: "a_ufo", icon: "🛸", title: "未知との遭遇", desc: "UFOからのジャックポット報酬を受け取る", condition: () => false },
            { id: "a_alien10", icon: "👾", title: "ダイバーシティ", desc: "宇宙人を10人雇う", condition: () => gameState.aliens >= 10 },
            { id: "a_rich", icon: "💰", title: "ミリオネア", desc: "所持資源が1m（100万）を突破する", condition: () => gameState.stardust >= 1000000 },
            { id: "a_prestige", icon: "🚀", title: "次元の旅人", desc: "初めて次の惑星へ移住（プレステージ）を行う", condition: () => gameState.planetLevel >= 2 }
        ];

        gameState.items.forEach((item, index) => {
            milestones.forEach(ms => {
                achievementsList.push({
                    id: `a_item_${item.id}_${ms}`,
                    icon: itemIcons[index],
                    title: `[${item.name}] x${ms}`,
                    desc: `${item.name}を${ms}個建設する`,
                    condition: () => gameState.items[item.id].count >= ms
                });
            });
        });

        const planetEvos = [
            { threshold: 0, name: "不毛な岩石惑星", color: "#5d9cec", loreTitle: "第1章：孤独な採掘", loreDesc: "何もない宇宙の片隅で、最初の採掘ドローンが起動した。" },
            { threshold: 10, name: "大気のある惑星", color: "#4fc1e9", loreTitle: "第2章：薄青のヴェール", loreDesc: "酸素精製により、惑星は薄い青色の大気に包まれた。" },
            { threshold: 150, name: "緑豊かな新世界", color: "#a0d468", loreTitle: "第3章：緑の開拓地", loreDesc: "地熱エネルギーが大地を暖め、植物が爆発的に繁殖し始めた。" },
            { threshold: 1500, name: "高度文明の惑星", color: "#ffce54", loreTitle: "第4章：星を繋ぐ塔", loreDesc: "軌道エレベーターが天を貫き、地表と宇宙が完全にリンクした。" },
            { threshold: 15000, name: "サイバー・ハブ", color: "#ac92ec", loreTitle: "第5章：情報の特異点", loreDesc: "惑星そのものが超巨大な演算器へと変貌を遂げた。" },
            { threshold: 150000, name: "銀河の要塞都市", color: "#ed5565", loreTitle: "第6章：銀河の中心", loreDesc: "全銀河の経済と軍事を支配する難攻不落の要塞都市となった。" },
            { threshold: 1500000, name: "超次元惑星コア", color: "#ffffff", loreTitle: "第7章：物質の超越", loreDesc: "星は純粋な光を放つ次元の特異点へと進化した。" },
            { threshold: 50000000, name: "銀河連邦首都", color: "#f6b93b", loreTitle: "第8章：星々の統合", loreDesc: "無数の星系を束ねる巨大ネットワークの中心。" },
            { threshold: 2000000000, name: "事象の地平線", color: "#1e272e", loreTitle: "第9章：時空の支配", loreDesc: "人工ブラックホールを完全に制御し、時間と空間さえも資源として抽出している。" },
            { threshold: 100000000000, name: "ビッグバン・コア", color: "#fa983a", loreTitle: "第10章：新たな宇宙", loreDesc: "この星から放たれるエネルギーは、新しい宇宙を創り出せるほどの規模に達した。" }
        ];

        function createParticles() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 80; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 3 + 1;
                p.style.width = `${size}px`; p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}vw`; p.style.top = `${Math.random() * 100}vh`;
                p.style.animationDuration = `${Math.random() * 4 + 3}s`; p.style.animationDelay = `${Math.random() * 5}s`;
                if (Math.random() > 0.8) { p.style.background = 'var(--accent-color)'; p.style.boxShadow = '0 0 8px var(--accent-color)'; } 
                else if (Math.random() > 0.9) { p.style.background = 'var(--gold)'; p.style.boxShadow = '0 0 8px var(--gold)'; }
                container.appendChild(p);
            }
        }

        function loadGame() {
            const saved = localStorage.getItem('astroEvolutionSave');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    gameState.stardust = data.stardust || 0;
                    gameState.currentEvoLevel = data.currentEvoLevel || 0;
                    gameState.aliens = data.aliens || 0;
                    gameState.alienCost = data.alienCost || 500;
                    gameState.planetLevel = data.planetLevel || 1;
                    gameState.unlockedAchievements = data.unlockedAchievements || [];
                    gameState.lastSaveTime = data.lastSaveTime || Date.now();
                    
                    data.items.forEach((item, i) => {
                        if(gameState.items[i]) { gameState.items[i].count = item.count; gameState.items[i].cost = item.cost; }
                    });
                    
                    document.getElementById('alien-container').innerHTML = '';
                    for(let i=0; i<gameState.aliens; i++) spawnAlienVisual();
                    applyEvolution(gameState.currentEvoLevel);
                    updateButtons();
                    updateDisplay();

                    // ★ オフライン報酬の計算 ★
                    const now = Date.now();
                    const diffMs = now - gameState.lastSaveTime;
                    const diffSec = Math.floor(diffMs / 1000);
                    
                    // 1分(60秒)以上離脱しており、かつSPSが1以上ある場合のみ処理
                    const currentSps = getTotalSps();
                    if (diffSec >= 60 && currentSps > 0) {
                        const offlineReward = Math.floor(currentSps * diffSec * 0.1); // 10%の効率
                        gameState.stardust += offlineReward;
                        openModal('offline', { time: diffSec, reward: offlineReward });
                        gameState.lastSaveTime = now; // 計算後に更新
                        saveGame();
                    }

                } catch(e) {
                    console.error("セーブデータの読み込みに失敗しました", e);
                }
            }
        }

        function getMilestoneStars(count) {
            if (count >= 100) return "★★★★"; if (count >= 50) return "★★★☆";
            if (count >= 10) return "★★☆☆"; if (count >= 1) return "★☆☆☆"; return "☆☆☆☆";
        }

        function initShop() {
            const container = document.getElementById('shop-items');
            container.innerHTML = '';
            gameState.items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card'; card.id = `item-${item.id}`; card.onclick = () => buyItem(item.id);
                card.innerHTML = `
                    <div class="item-info"><span class="item-name">${item.name}</span><span class="item-count" id="count-${item.id}">${item.count}</span></div>
                    <span class="item-cost">Cost: <span id="cost-${item.id}">${formatNumber(item.cost)}</span></span>
                    <div class="item-desc">
                        <span>基本: +${formatNumber(item.sps)}/sec</span>
                        <span class="item-milestone" id="star-${item.id}">${getMilestoneStars(item.count)}</span>
                    </div>
                `;
                container.appendChild(card);
            });
            updateButtons();
        }

        function clickPlanet(e) {
            playSound('tap');
            const x = e.clientX || e.touches?.[0].clientX || window.innerWidth / 2;
            const y = e.clientY || e.touches?.[0].clientY || 200;
            const power = 1 + Math.floor(getTotalSps() * 0.40);
            gameState.stardust += power;
            createFloatingText(x, y, `+${formatNumber(power)}`);
            updateDisplay();
        }

        function createFloatingText(x, y, text, isJackpot = false) {
            const el = document.createElement('div');
            el.className = isJackpot ? 'floating-text jackpot-text' : 'floating-text';
            el.style.left = `${x}px`; el.style.top = `${y}px`; el.innerText = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), isJackpot ? 1500 : 1000);
        }

        function buyItem(id) {
            const item = gameState.items[id];
            if (gameState.stardust >= item.cost) {
                playSound('buy');
                gameState.stardust -= item.cost; item.count++; item.cost *= 1.2;
                updateDisplay(); updateButtons(); saveGame();
            }
        }

        function hireAlien() {
            if (gameState.stardust >= gameState.alienCost) {
                playSound('buy');
                gameState.stardust -= gameState.alienCost; gameState.aliens++; gameState.alienCost *= 4; 
                spawnAlienVisual(); updateDisplay(); updateButtons(); saveGame();
            }
        }

        function spawnAlienVisual() {
            const container = document.getElementById('alien-container');
            const alien = document.createElement('div');
            alien.className = 'alien'; alien.innerText = alienEmojis[Math.floor(Math.random() * alienEmojis.length)];
            let x = Math.random() * 80 + 10, y = Math.random() * 80 + 10;
            alien.style.left = `${x}%`; alien.style.top = `${y}%`;
            container.appendChild(alien);
            setInterval(() => {
                x = Math.max(5, Math.min(95, x + (Math.random() * 20 - 10)));
                y = Math.max(5, Math.min(95, y + (Math.random() * 20 - 10)));
                alien.style.left = `${x}%`; alien.style.top = `${y}%`;
            }, 3000 + Math.random() * 2000);
        }

        function spawnUFO() {
            const viewArea = document.getElementById('view-area');
            const ufo = document.createElement('div');
            ufo.className = 'golden-ufo'; ufo.innerText = '🛸✨';
            ufo.style.top = `${Math.random() * 60 + 10}%`; ufo.style.left = `0`; 

            playSound('ufoSpawn');

            const handleUfoClick = (e) => {
                e.preventDefault();
                playSound('ufoTap');
                const bonus = Math.floor((getTotalSps() * 100) / 3) + 333;
                gameState.stardust += bonus;
                const x = e.clientX || e.touches?.[0].clientX || window.innerWidth / 2;
                const y = e.clientY || e.touches?.[0].clientY || 100;
                createFloatingText(x, y, `JACKPOT! +${formatNumber(bonus)}`, true);
                ufo.remove();
                unlockAchievement("a_ufo"); updateDisplay(); saveGame();
            };
            
            ufo.onclick = handleUfoClick; ufo.ontouchstart = handleUfoClick;
            viewArea.appendChild(ufo);
            setTimeout(() => { if(ufo.parentNode) ufo.remove(); }, 6000);
        }

        function checkRandomEvent() { if (Math.random() < 0.025) spawnUFO(); }

        function getTotalSps() {
            let baseSps = gameState.items.reduce((sum, item) => sum + (item.count * item.sps), 0);
            return Math.floor(baseSps * (1 + (gameState.aliens * 0.1)) * (1 + (gameState.planetLevel - 1) * 0.5));
        }

        function update() {
            gameState.stardust += getTotalSps() / 10;
            updateDisplay(); updateButtons(); checkEvolution(); checkAchievements();
        }

        function checkEvolution() {
            const sps = getTotalSps();
            let newEvo = 0;
            for (let i = planetEvos.length - 1; i >= 0; i--) {
                if (sps >= planetEvos[i].threshold) { newEvo = i; break; }
            }
            if (newEvo > gameState.currentEvoLevel) {
                gameState.currentEvoLevel = newEvo; applyEvolution(newEvo);
            }
        }

        function applyEvolution(level) {
            const evo = planetEvos[level];
            document.getElementById('planet-visual').style.setProperty('--planet-color', evo.color);
            document.getElementById('planet-visual').style.boxShadow = `0 0 80px ${evo.color}88`;
            document.getElementById('planet-name').innerText = (gameState.planetLevel > 1 ? `[第${gameState.planetLevel}惑星] ` : "") + evo.name;
        }

        function updateDisplay() {
            document.getElementById('resource-display').innerText = formatNumber(gameState.stardust);
            document.getElementById('sps-display').innerText = formatNumber(getTotalSps());
            document.getElementById('bonus-display').innerText = gameState.aliens > 0 ? `(エイリアン: +${gameState.aliens * 10}%)` : '';
            
            if (gameState.planetLevel > 1) {
                const prestigeMult = 1 + (gameState.planetLevel - 1) * 0.5;
                const displayMult = prestigeMult % 1 === 0 ? prestigeMult : prestigeMult.toFixed(2);
                document.getElementById('prestige-display').innerText = `(周回ボーナス: x${displayMult})`;
            } else {
                document.getElementById('prestige-display').innerText = '';
            }
        }

        function updateButtons() {
            gameState.items.forEach(item => {
                const card = document.getElementById(`item-${item.id}`);
                document.getElementById(`cost-${item.id}`).innerText = formatNumber(item.cost);
                document.getElementById(`count-${item.id}`).innerText = item.count;
                document.getElementById(`star-${item.id}`).innerText = getMilestoneStars(item.count);
                card.classList.toggle('disabled', gameState.stardust < item.cost);
            });
            const btnAlien = document.getElementById('btn-alien');
            btnAlien.innerText = `👾 宇宙人を雇う (Cost: ${formatNumber(gameState.alienCost)})`;
            btnAlien.disabled = gameState.stardust < gameState.alienCost;

            const btnPrestige = document.getElementById('btn-prestige');
            if (gameState.items[10].count >= 1) {
                btnPrestige.style.display = "block"; btnPrestige.disabled = false;
            } else { btnPrestige.style.display = "none"; }
        }

        function checkAchievements() {
            achievementsList.forEach(ach => {
                if (!gameState.unlockedAchievements.includes(ach.id) && ach.condition()) {
                    unlockAchievement(ach.id);
                }
            });
        }

        function unlockAchievement(id) {
            if (!gameState.unlockedAchievements.includes(id)) {
                gameState.unlockedAchievements.push(id);
                const ach = achievementsList.find(a => a.id === id);
                showToast(ach.icon, ach.title); saveGame();
            }
        }

        function showToast(icon, title) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<span class="toast-icon">${icon}</span><div><div style="font-size: 0.8rem; opacity:0.9;">実績解除！</div><div>${title}</div></div>`;
            container.appendChild(toast);
            setTimeout(() => { if(toast.parentNode) toast.remove(); }, 4500);
        }

        function prestigeJump() {
            if (confirm("現在の惑星を旅立ち、新たな惑星へ移住しますか？\n【注意】資源、施設、宇宙人は初期化されます（実績は引き継がれます）。\n【報酬】以降の全生産量が永久に +50% されます！")) {
                gameState.planetLevel++; gameState.stardust = 0; gameState.currentEvoLevel = 0; gameState.aliens = 0; gameState.alienCost = 500;
                gameState.items.forEach(item => { item.count = 0; item.cost = item.baseCost; });
                document.getElementById('alien-container').innerHTML = '';
                applyEvolution(0); updateDisplay(); updateButtons(); saveGame();
            }
        }

        function saveGame() {
            gameState.lastSaveTime = Date.now(); // 保存時に時刻を更新
            const data = {
                stardust: gameState.stardust, currentEvoLevel: gameState.currentEvoLevel, aliens: gameState.aliens, alienCost: gameState.alienCost,
                planetLevel: gameState.planetLevel, unlockedAchievements: gameState.unlockedAchievements,
                lastSaveTime: gameState.lastSaveTime,
                items: gameState.items.map(i => ({ count: i.count, cost: i.cost }))
            };
            localStorage.setItem('astroEvolutionSave', JSON.stringify(data));
        }

        function exportSaveData() {
            saveGame();
            const savedData = localStorage.getItem('astroEvolutionSave');
            if(savedData) {
                const encoded = btoa(encodeURIComponent(savedData));
                const textArea = document.getElementById('save-data-textarea');
                textArea.value = encoded; textArea.select();
                navigator.clipboard.writeText(encoded).then(() => { showToast('📋', 'セーブデータをクリップボードにコピーしました！'); })
                .catch(() => { showToast('📋', '上のテキストボックスから手動でコピーしてください。'); });
            }
        }

        function importSaveData() {
            const textArea = document.getElementById('save-data-textarea');
            const encoded = textArea.value.trim();
            if(!encoded) return alert("セーブデータのテキストが入力されていません。");
            try {
                const decoded = decodeURIComponent(atob(encoded));
                const testParse = JSON.parse(decoded);
                if(testParse && testParse.stardust !== undefined && testParse.items) {
                    if(confirm("現在のデータは上書きされます。よろしいですか？")) {
                        // インポート直後にオフライン報酬が出ないよう、時刻を現在に上書きする
                        testParse.lastSaveTime = Date.now();
                        localStorage.setItem('astroEvolutionSave', JSON.stringify(testParse));
                        loadGame(); closeModal(); showToast('📥', 'データの引き継ぎが完了しました！');
                    }
                } else throw new Error("Invalid format");
            } catch(e) { alert("データの形式が正しくありません。正しいテキストを入力してください。"); }
        }

        // 引数に data (オフライン用の情報) を追加
        function openModal(type, data = null) {
            const overlay = document.getElementById('modal-overlay');
            const list = document.getElementById('modal-list');
            const title = document.getElementById('modal-title');
            list.innerHTML = '';

            if (type === 'archive') {
                title.innerText = "🌌 宇宙開拓史";
                planetEvos.forEach((evo, index) => {
                    const entry = document.createElement('div');
                    if (index <= gameState.currentEvoLevel) {
                        entry.className = 'lore-entry'; entry.style.borderLeftColor = evo.color;
                        entry.innerHTML = `<h4 style="color: ${evo.color}">${evo.loreTitle}</h4><p>${evo.loreDesc}</p>`;
                    } else {
                        entry.className = 'lore-entry lore-locked';
                        entry.innerHTML = `<p>❓ 条件未達成（SPS: ${formatNumber(evo.threshold)}で解放）</p>`;
                    }
                    list.appendChild(entry);
                });
            } else if (type === 'achievements') {
                title.innerText = `🏆 獲得した実績 (${gameState.unlockedAchievements.length} / ${achievementsList.length})`;
                achievementsList.forEach(ach => {
                    const isUnlocked = gameState.unlockedAchievements.includes(ach.id);
                    const entry = document.createElement('div');
                    entry.className = isUnlocked ? 'ach-entry unlocked' : 'ach-entry';
                    entry.innerHTML = `
                        <div class="ach-icon">${isUnlocked ? ach.icon : "🔒"}</div>
                        <div class="ach-info">
                            <h4>${isUnlocked ? ach.title : "？？？"}</h4>
                            <p>${isUnlocked ? ach.desc : "条件が未達成です"}</p>
                        </div>
                    `;
                    list.appendChild(entry);
                });
            } else if (type === 'settings') {
                title.innerText = "⚙️ 設定 / データ引き継ぎ";
                list.innerHTML = `
                    <div style="margin-bottom: 20px;">
                        <p style="font-size: 0.9rem; color: #ccc;">現在の進行状況をテキストとして保存したり、別の端末に引き継いだりできます。</p>
                        <textarea id="save-data-textarea" style="width: 100%; height: 100px; background: #0b0e14; color: #00d4ff; border: 1px solid #343b47; border-radius: 5px; padding: 10px; box-sizing: border-box; font-family: monospace; resize: vertical;" placeholder="ここにセーブデータ文字列が表示/入力されます"></textarea>
                    </div>
                    <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                        <button class="action-btn" style="background: #27ae60; border: 1px solid #2ecc71;" onclick="exportSaveData()">📋 データを書き出してコピー</button>
                        <button class="action-btn" style="background: #c0392b; border: 1px solid #e74c3c;" onclick="importSaveData()">📥 テキストから復元する</button>
                        <button class="action-btn" style="background: #7f8c8d; border: 1px solid #bdc3c7;" onclick="if(confirm('本当にデータを全消去しますか？\\n※この操作は取り消せません！')) { localStorage.removeItem('astroEvolutionSave'); location.reload(); }">🗑️ セーブデータ全消去</button>
                    </div>
                `;
            } else if (type === 'offline') {
                // ★ 新規追加：オフライン報酬の表示画面
                title.innerText = "💤 オフライン作業報告";
                list.innerHTML = `
                    <div style="text-align: center; margin: 10px 0;">
                        <div style="font-size: 4rem; margin-bottom: 10px;">☕</div>
                        <p style="font-size: 1.1rem;">お帰りなさい！あなたが休んでいる間も、<br>施設と宇宙人たちが少しだけ頑張ってくれました。</p>
                        <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #343b47;">
                            <p style="margin: 0; color: #aaa;">経過時間: <span style="color: #fff; font-weight: bold;">${formatTime(data.time)}</span></p>
                            <p style="margin: 10px 0 0 0; color: #aaa;">効率: <span style="color: var(--accent-color); font-weight: bold;">通常の10%</span></p>
                            <p style="margin: 10px 0 0 0; font-size: 1.5rem; color: var(--gold); font-weight: bold;">獲得資源: +${formatNumber(data.reward)}</p>
                        </div>
                        <button class="action-btn" style="background: var(--accent-color); color: #000; margin-top: 20px; width: 80%; font-size: 1.1rem;" onclick="closeModal()">受け取る</button>
                    </div>
                `;
            }
            overlay.style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        createParticles();
        loadGame(); 
        initShop(); 
        setInterval(update, 100); 
        setInterval(saveGame, 10000); 
        setInterval(checkRandomEvent, 2000); 
    </script>
</body>
</html>
