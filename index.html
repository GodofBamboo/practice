<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アストロ・ハーベスターズ：エボリューション</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --panel-bg: #1a1f29;
            --planet-color: #5d9cec;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #header {
            text-align: center;
            padding: 15px;
            width: 100%;
            background: linear-gradient(180deg, #161b22 0%, transparent 100%);
        }

        #resource-display {
            font-size: 2.8rem;
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
        }

        .status-panel {
            background: rgba(255,255,255,0.05);
            padding: 5px 20px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
        }

        #main-container {
            display: flex;
            width: 95%;
            max-width: 1100px;
            gap: 20px;
            flex-grow: 1;
            padding-bottom: 20px;
        }

        #view-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 惑星の進化アニメーション */
        #planet-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
        }
        #planet-container:active { transform: scale(0.95); }

        #planet-visual {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle at 30% 30%, var(--planet-color), #000);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.2);
            transition: all 1s ease;
        }

        #planet-name {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffce54;
        }

        #shop-area {
            width: 380px;
            overflow-y: auto;
            background-color: var(--panel-bg);
            border-radius: 15px;
            padding: 15px;
            border-left: 2px solid #343b47;
        }

        .item-card {
            background: #252d3a;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid #343b47;
            position: relative;
            overflow: hidden;
        }
        .item-card:hover { background: #2e3848; }
        .item-card.disabled { opacity: 0.4; cursor: not-allowed; }

        .item-info { display: flex; justify-content: space-between; align-items: center; }
        .item-name { font-weight: bold; font-size: 1rem; }
        .item-count { font-size: 1.2rem; color: var(--accent-color); font-weight: bold; }
        .item-cost { color: #ffce54; font-size: 0.85rem; display: block; }
        .item-desc { font-size: 0.75rem; color: #888; }

        .floating-text {
            position: absolute;
            color: #fff;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s forwards;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-120px); opacity: 0; }
        }

        #evo-message {
            position: absolute;
            top: 20%;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px var(--accent-color);
            pointer-events: none;
            opacity: 0;
        }
        .animate-evo { animation: flash 2s; }
        @keyframes flash {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div id="header">
        <h1>ASTRO HARVESTERS</h1>
        <div id="resource-display">0</div>
        <div class="status-panel">
            SPS (毎秒生産量): <span id="sps-display" style="color:var(--accent-color)">0</span>
        </div>
    </div>

    <div id="main-container">
        <div id="view-area">
            <div id="evo-message">PLANET EVOLVED!</div>
            <div id="planet-container" onclick="clickPlanet(event)">
                <div id="planet-visual"></div>
            </div>
            <div id="planet-name">初期化された岩石惑星</div>
            <p style="font-size: 0.8rem; color: #666;">タップで資源を採取</p>
        </div>

        <div id="shop-area">
            <h3 style="margin-top:0">銀河開発メニュー</h3>
            <div id="shop-items"></div>
        </div>
    </div>

    <script>
        let gameState = {
            stardust: 0,
            currentEvoLevel: 0,
            items: [
                { id: 0, name: "採掘ドローン", cost: 15, sps: 1, count: 0 },
                { id: 1, name: "酸素精製プラント", cost: 100, sps: 8, count: 0 }, // 5 -> 8 (ブースト)
                { id: 2, name: "地熱発電所", cost: 1100, sps: 45, count: 0 },    // 12 -> 45
                { id: 3, name: "軌道エレベーター", cost: 12000, sps: 250, count: 0 }, // 45 -> 250
                { id: 4, name: "反物質リアクター", cost: 130000, sps: 1600, count: 0 }, // 150 -> 1600
                { id: 5, name: "銀河貿易センター", cost: 1400000, sps: 12000, count: 0 } // 800 -> 12000
            ]
        };

        const planetEvos = [
            { threshold: 0, name: "不毛な岩石惑星", color: "#5d9cec" },
            { threshold: 10, name: "大気のある惑星", color: "#4fc1e9" },
            { threshold: 100, name: "緑豊かな新世界", color: "#a0d468" },
            { threshold: 1000, name: "高度文明の惑星", color: "#ffce54" },
            { threshold: 10000, name: "サイバー・ハブ", color: "#ac92ec" },
            { threshold: 100000, name: "銀河の要塞都市", color: "#ed5565" },
            { threshold: 1000000, name: "超次元惑星コア", color: "#ffffff" }
        ];

        function loadGame() {
            const saved = localStorage.getItem('astroEvolutionSave');
            if (saved) {
                const data = JSON.parse(saved);
                gameState.stardust = data.stardust;
                data.items.forEach((item, i) => {
                    gameState.items[i].count = item.count;
                    gameState.items[i].cost = item.cost;
                });
            }
        }

        function initShop() {
            const container = document.getElementById('shop-items');
            container.innerHTML = '';
            gameState.items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.id = `item-${item.id}`;
                card.onclick = () => buyItem(item.id);
                card.innerHTML = `
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-count" id="count-${item.id}">${item.count}</span>
                    </div>
                    <span class="item-cost">Cost: <span id="cost-${item.id}">${Math.floor(item.cost)}</span></span>
                    <span class="item-desc">生産量: +${item.sps.toLocaleString()}/sec</span>
                `;
                container.appendChild(card);
            });
        }

        function clickPlanet(e) {
            const power = 1 + Math.floor(getTotalSps() * 0.05); // SPSの5%をクリック力に加算
            gameState.stardust += power;
            createFloatingText(e.clientX, e.clientY, `+${power}`);
            updateDisplay();
        }

        function createFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.innerText = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function buyItem(id) {
            const item = gameState.items[id];
            if (gameState.stardust >= item.cost) {
                gameState.stardust -= item.cost;
                item.count++;
                item.cost *= 1.2; // コスト上昇率を少し高めてバランス調整
                updateDisplay();
                updateShop();
                saveGame();
            }
        }

        function getTotalSps() {
            return gameState.items.reduce((sum, item) => sum + (item.count * item.sps), 0);
        }

        function update() {
            gameState.stardust += getTotalSps() / 10;
            updateDisplay();
            updateShop();
            checkEvolution();
        }

        function checkEvolution() {
            const sps = getTotalSps();
            let newEvo = 0;
            for (let i = planetEvos.length - 1; i >= 0; i--) {
                if (sps >= planetEvos[i].threshold) {
                    newEvo = i;
                    break;
                }
            }

            if (newEvo > gameState.currentEvoLevel) {
                gameState.currentEvoLevel = newEvo;
                const evo = planetEvos[newEvo];
                document.getElementById('planet-visual').style.setProperty('--planet-color', evo.color);
                document.getElementById('planet-visual').style.boxShadow = `0 0 80px ${evo.color}88`;
                document.getElementById('planet-name').innerText = evo.name;
                
                const msg = document.getElementById('evo-message');
                msg.classList.remove('animate-evo');
                void msg.offsetWidth; // リフロー発生させてアニメーションをリセット
                msg.classList.add('animate-evo');
            }
        }

        function updateDisplay() {
            document.getElementById('resource-display').innerText = Math.floor(gameState.stardust).toLocaleString();
            document.getElementById('sps-display').innerText = getTotalSps().toLocaleString();
        }

        function updateShop() {
            gameState.items.forEach(item => {
                const card = document.getElementById(`item-${item.id}`);
                document.getElementById(`cost-${item.id}`).innerText = Math.floor(item.cost).toLocaleString();
                document.getElementById(`count-${item.id}`).innerText = item.count;
                
                if (gameState.stardust >= item.cost) card.classList.remove('disabled');
                else card.classList.add('disabled');
            });
        }

        function saveGame() {
            const data = {
                stardust: gameState.stardust,
                items: gameState.items.map(i => ({ count: i.count, cost: i.cost }))
            };
            localStorage.setItem('astroEvolutionSave', JSON.stringify(data));
        }

        loadGame();
        initShop();
        setInterval(update, 100);
        setInterval(saveGame, 10000);
    </script>
</body>
</html>
