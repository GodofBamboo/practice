<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アストロ・ハーベスターズ：マルチバース</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --panel-bg: #1a1f29;
            --planet-color: #5d9cec;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #header {
            text-align: center;
            padding: 15px;
            width: 100%;
            background: linear-gradient(180deg, #161b22 0%, transparent 100%);
            flex-shrink: 0;
            z-index: 10;
        }

        #resource-display {
            font-size: 2.8rem;
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
        }

        .status-panel {
            background: rgba(255,255,255,0.05);
            padding: 5px 20px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
        }

        #main-container {
            display: flex;
            width: 95%;
            max-width: 1100px;
            gap: 20px;
            height: calc(100vh - 140px);
            padding-bottom: 20px;
        }

        #view-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #planet-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
            z-index: 5;
        }
        #planet-container:active { transform: scale(0.95); }

        #planet-visual {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle at 30% 30%, var(--planet-color), #000);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.2);
            transition: all 1s ease;
        }

        #planet-name {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffce54;
            z-index: 5;
        }

        #alien-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }
        .alien {
            position: absolute;
            font-size: 2rem;
            transition: top 3s ease-in-out, left 3s ease-in-out;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.3));
        }

        .golden-ufo {
            position: absolute;
            font-size: 3.5rem;
            cursor: pointer;
            z-index: 150;
            filter: drop-shadow(0 0 20px #ffce54);
            animation: flyAcross 6s linear forwards;
            user-select: none;
        }
        .golden-ufo:hover { transform: scale(1.1); filter: drop-shadow(0 0 30px #fff); }
        @keyframes flyAcross {
            0% { transform: translateX(-150px) translateY(0); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateX(calc(50vw - 200px)) translateY(-100px); }
            90% { opacity: 1; }
            100% { transform: translateX(100vw) translateY(50px); opacity: 0; }
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            z-index: 5;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-btn {
            padding: 10px 15px;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            border: none;
        }
        
        #btn-archive { background: #243b55; border: 1px solid var(--accent-color); }
        #btn-archive:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 15px var(--accent-color); }

        #btn-alien { background: #4a148c; border: 1px solid #d500f9; }
        #btn-alien:hover:not(:disabled) { background: #d500f9; box-shadow: 0 0 15px #d500f9; }
        #btn-alien:disabled { opacity: 0.4; cursor: not-allowed; }

        #btn-prestige { background: #d35400; border: 1px solid #f39c12; }
        #btn-prestige:hover:not(:disabled) { background: #f39c12; box-shadow: 0 0 15px #f39c12; }
        #btn-prestige:disabled { opacity: 0.4; cursor: not-allowed; display: none; }

        #shop-area {
            width: 380px;
            height: 100%;
            overflow-y: auto;
            background-color: var(--panel-bg);
            border-radius: 15px;
            padding: 15px;
            border-left: 2px solid #343b47;
            box-sizing: border-box;
        }

        #shop-area::-webkit-scrollbar { width: 8px; }
        #shop-area::-webkit-scrollbar-track { background: #1a1f29; border-radius: 4px; }
        #shop-area::-webkit-scrollbar-thumb { background: #343b47; border-radius: 4px; }
        #shop-area::-webkit-scrollbar-thumb:hover { background: #00d4ff; }

        #shop-items { padding-bottom: 60px; }

        .item-card {
            background: #252d3a;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid #343b47;
            position: relative;
            overflow: hidden;
        }
        .item-card:hover { background: #2e3848; }
        .item-card.disabled { opacity: 0.4; cursor: not-allowed; }

        .item-info { display: flex; justify-content: space-between; align-items: center; }
        .item-name { font-weight: bold; font-size: 1rem; }
        .item-count { font-size: 1.2rem; color: var(--accent-color); font-weight: bold; }
        .item-cost { color: #ffce54; font-size: 0.9rem; display: block; font-weight: bold;}
        .item-desc { font-size: 0.75rem; color: #888; }

        .floating-text {
            position: absolute;
            color: #fff;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s forwards;
            z-index: 200;
            text-shadow: 0 0 5px #000;
        }
        .jackpot-text { color: #ffce54; font-size: 2rem; animation: floatUpJackpot 1.5s forwards; text-shadow: 0 0 20px #ffce54, 0 0 5px #000; }

        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
        @keyframes floatUpJackpot { 0% { transform: translateY(0) scale(1); opacity: 1; } 50% { transform: translateY(-80px) scale(1.2); opacity: 1; } 100% { transform: translateY(-150px) scale(1); opacity: 0; } }

        #evo-message { position: absolute; top: 10%; font-size: 2rem; font-weight: bold; color: #fff; text-shadow: 0 0 20px var(--accent-color); pointer-events: none; opacity: 0; z-index: 50; }
        .animate-evo { animation: flash 2s; }
        @keyframes flash { 0%, 100% { opacity: 0; } 50% { opacity: 1; transform: scale(1.2); } }

        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 300; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        #modal-content { background: #1a1f29; width: 80%; max-width: 600px; max-height: 80vh; border-radius: 15px; border: 2px solid var(--accent-color); padding: 20px; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #fff; font-size: 1.5rem; cursor: pointer; }
        .lore-entry { margin-bottom: 15px; padding: 15px; background: #252d3a; border-left: 4px solid #5d9cec; border-radius: 4px; }
        .lore-entry h4 { margin: 0 0 5px 0; color: #ffce54; }
        .lore-entry p { margin: 0; font-size: 0.9rem; line-height: 1.4; color: #ddd; }
        .lore-locked { opacity: 0.3; border-left-color: #333; text-align: center; font-style: italic; }
    </style>
</head>
<body>

    <div id="header">
        <h1>ASTRO HARVESTERS</h1>
        <div id="resource-display">0</div>
        <div class="status-panel">
            SPS (毎秒生産量): <span id="sps-display" style="color:var(--accent-color)">0</span>
            <span id="bonus-display" style="margin-left: 10px; color: #d500f9; font-size: 0.8rem;"></span>
            <span id="prestige-display" style="margin-left: 10px; color: #f39c12; font-size: 0.8rem; font-weight: bold;"></span>
        </div>
    </div>

    <div id="main-container">
        <div id="view-area">
            <div id="alien-container"></div>
            <div id="evo-message">PLANET EVOLVED!</div>
            <div id="planet-container" onclick="clickPlanet(event)">
                <div id="planet-visual"></div>
            </div>
            <div id="planet-name">初期化された岩石惑星</div>
            <p style="font-size: 0.8rem; color: #666; z-index: 5;">タップで資源を採取</p>
            
            <div class="button-group">
                <button class="action-btn" id="btn-archive" onclick="openArchive()">🌌 歴史を見る</button>
                <button class="action-btn" id="btn-alien" onclick="hireAlien()">👾 宇宙人を雇う</button>
                <button class="action-btn" id="btn-prestige" onclick="prestigeJump()">🚀 次の惑星へ移住</button>
            </div>
        </div>

        <div id="shop-area">
            <h3 style="margin-top:0">銀河開発メニュー</h3>
            <div id="shop-items"></div>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="modal-content">
            <span class="close-btn" onclick="closeArchive()">×</span>
            <h2 style="color: var(--accent-color); margin-top:0;">宇宙開拓史</h2>
            <div id="lore-list"></div>
        </div>
    </div>

    <script>
        function formatNumber(num) {
            if (num < 1000) return Math.floor(num).toString();
            const suffixes = ["", "k", "m", "b", "t", "qa", "qi", "sx", "sp", "o", "n", "d"];
            const tier = Math.floor(Math.log10(num) / 3);
            if (tier >= suffixes.length) return num.toExponential(2).replace('e+', 'e'); 
            const suffix = suffixes[tier];
            const scale = Math.pow(10, tier * 3);
            const scaled = num / scale;
            return parseFloat(scaled.toFixed(2)) + suffix;
        }

        let gameState = {
            stardust: 0,
            currentEvoLevel: 0,
            aliens: 0,
            alienCost: 500,
            planetLevel: 1, // 現在何番目の惑星か（プレステージ回数+1）
            items: [
                { id: 0, name: "採掘ドローン", baseCost: 15, cost: 15, sps: 2, count: 0 },
                { id: 1, name: "酸素精製プラント", baseCost: 100, cost: 100, sps: 12, count: 0 },
                { id: 2, name: "地熱発電所", baseCost: 1100, cost: 1100, sps: 68, count: 0 },
                { id: 3, name: "軌道エレベーター", baseCost: 12000, cost: 12000, sps: 375, count: 0 },
                { id: 4, name: "反物質リアクター", baseCost: 130000, cost: 130000, sps: 2400, count: 0 },
                { id: 5, name: "銀河貿易センター", baseCost: 1400000, cost: 1400000, sps: 18000, count: 0 },
                { id: 6, name: "ダイソン球", baseCost: 15000000, cost: 15000000, sps: 142500, count: 0 },
                { id: 7, name: "人工ブラックホール", baseCost: 200000000, cost: 200000000, sps: 1200000, count: 0 },
                { id: 8, name: "銀河系シミュレーター", baseCost: 5000000000, cost: 5000000000, sps: 35000000, count: 0 }, 
                { id: 9, name: "多次元エネルギー抽出機", baseCost: 150000000000, cost: 150000000000, sps: 1200000000, count: 0 }, 
                { id: 10, name: "宇宙創生エンジン", baseCost: 8000000000000, cost: 8000000000000, sps: 75000000000, count: 0 },
                // ↓追加されたさらなる超インフレ施設
                { id: 11, name: "多世界干渉アレイ", baseCost: 400000000000000, cost: 400000000000000, sps: 5000000000000, count: 0 }, // 400t
                { id: 12, name: "アカシック・マニピュレーター", baseCost: 25000000000000000, cost: 25000000000000000, sps: 400000000000000, count: 0 }, // 25qa
                { id: 13, name: "事象の超越者（オメガ）", baseCost: 999000000000000000, cost: 999000000000000000, sps: 20000000000000000, count: 0 } // 999qa
            ]
        };

        const alienEmojis = ["👾", "👽", "🤖", "🐙", "🛸", "🚀", "🧑‍🚀", "👁️"];
        
        const planetEvos = [
            { threshold: 0, name: "不毛な岩石惑星", color: "#5d9cec", loreTitle: "第1章：孤独な採掘", loreDesc: "何もない宇宙の片隅で、最初の採掘ドローンが起動した。すべてはここから始まる。" },
            { threshold: 10, name: "大気のある惑星", color: "#4fc1e9", loreTitle: "第2章：薄青のヴェール", loreDesc: "酸素精製により、惑星は薄い青色の大気に包まれた。微かな生命の兆しを感じる。" },
            { threshold: 150, name: "緑豊かな新世界", color: "#a0d468", loreTitle: "第3章：緑の開拓地", loreDesc: "地熱エネルギーが大地を暖め、植物が爆発的に繁殖し始めた。もはやここは不毛の地ではない。" },
            { threshold: 1500, name: "高度文明の惑星", color: "#ffce54", loreTitle: "第4章：星を繋ぐ塔", loreDesc: "軌道エレベーターが天を貫き、地表と宇宙が完全にリンクした。文明は次なるステージへ。" },
            { threshold: 15000, name: "サイバー・ハブ", color: "#ac92ec", loreTitle: "第5章：情報の特異点", loreDesc: "反物質の力で情報網が光速を超え、惑星そのものが超巨大な演算器へと変貌を遂げた。" },
            { threshold: 150000, name: "銀河の要塞都市", color: "#ed5565", loreTitle: "第6章：銀河の中心", loreDesc: "膨大な富が集まるこの星は、全銀河の経済と軍事を支配する難攻不落の要塞都市となった。" },
            { threshold: 1500000, name: "超次元惑星コア", color: "#ffffff", loreTitle: "第7章：物質の超越", loreDesc: "エネルギーの生産量が物質の限界を突破。星は純粋な光を放つ次元の特異点へと進化した。" },
            { threshold: 50000000, name: "銀河連邦首都", color: "#f6b93b", loreTitle: "第8章：星々の統合", loreDesc: "無数の星系を束ねる巨大ネットワークの中心。もはや一つの銀河が一つの生命体のようだ。" },
            { threshold: 2000000000, name: "事象の地平線", color: "#1e272e", loreTitle: "第9章：時空の支配", loreDesc: "人工ブラックホールを完全に制御し、時間と空間さえも資源として抽出している。" },
            { threshold: 100000000000, name: "ビッグバン・コア", color: "#fa983a", loreTitle: "第10章：新たな宇宙", loreDesc: "この星から放たれるエネルギーは、新しい宇宙を創り出せるほどの規模に達した。" }
        ];

        function loadGame() {
            const saved = localStorage.getItem('astroEvolutionSave');
            if (saved) {
                const data = JSON.parse(saved);
                gameState.stardust = data.stardust || 0;
                gameState.currentEvoLevel = data.currentEvoLevel || 0;
                gameState.aliens = data.aliens || 0;
                gameState.alienCost = data.alienCost || 500;
                gameState.planetLevel = data.planetLevel || 1;
                
                data.items.forEach((item, i) => {
                    if(gameState.items[i]) {
                        gameState.items[i].count = item.count;
                        // 旧セーブデータ互換性のため、baseCostを持たせる
                        gameState.items[i].cost = item.cost;
                    }
                });
                applyEvolution(gameState.currentEvoLevel);
                
                for(let i=0; i<gameState.aliens; i++) {
                    spawnAlienVisual();
                }
            }
        }

        function initShop() {
            const container = document.getElementById('shop-items');
            container.innerHTML = '';
            gameState.items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.id = `item-${item.id}`;
                card.onclick = () => buyItem(item.id);
                card.innerHTML = `
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-count" id="count-${item.id}">${item.count}</span>
                    </div>
                    <span class="item-cost">Cost: <span id="cost-${item.id}">${formatNumber(item.cost)}</span></span>
                    <span class="item-desc">基本生産量: +${formatNumber(item.sps)}/sec</span>
                `;
                container.appendChild(card);
            });
            updateButtons();
        }

        function clickPlanet(e) {
            const power = 1 + Math.floor(getTotalSps() * 0.40);
            gameState.stardust += power;
            createFloatingText(e.clientX, e.clientY, `+${formatNumber(power)}`);
            updateDisplay();
        }

        function createFloatingText(x, y, text, isJackpot = false) {
            const el = document.createElement('div');
            el.className = isJackpot ? 'floating-text jackpot-text' : 'floating-text';
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.innerText = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), isJackpot ? 1500 : 1000);
        }

        function buyItem(id) {
            const item = gameState.items[id];
            if (gameState.stardust >= item.cost) {
                gameState.stardust -= item.cost;
                item.count++;
                item.cost *= 1.2;
                updateDisplay();
                updateButtons();
                saveGame();
            }
        }

        function hireAlien() {
            if (gameState.stardust >= gameState.alienCost) {
                gameState.stardust -= gameState.alienCost;
                gameState.aliens++;
                gameState.alienCost *= 4; 
                spawnAlienVisual();
                updateDisplay();
                updateButtons();
                saveGame();
            }
        }

        function spawnAlienVisual() {
            const container = document.getElementById('alien-container');
            const alien = document.createElement('div');
            alien.className = 'alien';
            alien.innerText = alienEmojis[Math.floor(Math.random() * alienEmojis.length)];
            
            let x = Math.random() * 80 + 10;
            let y = Math.random() * 80 + 10;
            alien.style.left = `${x}%`;
            alien.style.top = `${y}%`;
            container.appendChild(alien);
            
            setInterval(() => {
                let nx = x + (Math.random() * 20 - 10);
                let ny = y + (Math.random() * 20 - 10);
                nx = Math.max(5, Math.min(95, nx));
                ny = Math.max(5, Math.min(95, ny));
                x = nx; y = ny;
                alien.style.left = `${nx}%`;
                alien.style.top = `${ny}%`;
            }, 3000 + Math.random() * 2000);
        }

        function spawnUFO() {
            const viewArea = document.getElementById('view-area');
            const ufo = document.createElement('div');
            ufo.className = 'golden-ufo';
            ufo.innerText = '🛸✨';
            
            const startY = Math.random() * 60 + 10; 
            ufo.style.top = `${startY}%`;
            ufo.style.left = `0`; 

            ufo.onclick = (e) => {
                const bonus = Math.floor(getTotalSps() * 100) + 1000;
                gameState.stardust += bonus;
                createFloatingText(e.clientX, e.clientY, `JACKPOT! +${formatNumber(bonus)}`, true);
                ufo.remove();
                updateDisplay();
                saveGame();
            };

            viewArea.appendChild(ufo);
            setTimeout(() => { if(ufo.parentNode) ufo.remove(); }, 6000);
        }

        function checkRandomEvent() {
            if (Math.random() < 0.10) spawnUFO();
        }

        // 生産量の計算（プレステージボーナス適用）
        function getTotalSps() {
            let baseSps = gameState.items.reduce((sum, item) => sum + (item.count * item.sps), 0);
            let alienMultiplier = 1 + (gameState.aliens * 0.1);
            // 惑星レベル1につき、生産量が5倍に跳ね上がる（1->x1, 2->x5, 3->x25...）
            let prestigeMultiplier = Math.pow(5, gameState.planetLevel - 1);
            return Math.floor(baseSps * alienMultiplier * prestigeMultiplier);
        }

        function update() {
            gameState.stardust += getTotalSps() / 10;
            updateDisplay();
            updateButtons();
            checkEvolution();
        }

        function checkEvolution() {
            const sps = getTotalSps();
            let newEvo = 0;
            for (let i = planetEvos.length - 1; i >= 0; i--) {
                if (sps >= planetEvos[i].threshold) {
                    newEvo = i;
                    break;
                }
            }

            if (newEvo > gameState.currentEvoLevel) {
                gameState.currentEvoLevel = newEvo;
                applyEvolution(newEvo);
                
                const msg = document.getElementById('evo-message');
                msg.classList.remove('animate-evo');
                void msg.offsetWidth;
                msg.classList.add('animate-evo');
            }
        }

        function applyEvolution(level) {
            const evo = planetEvos[level];
            document.getElementById('planet-visual').style.setProperty('--planet-color', evo.color);
            document.getElementById('planet-visual').style.boxShadow = `0 0 80px ${evo.color}88`;
            
            // 惑星名に「第○惑星」をつける
            const prefix = gameState.planetLevel > 1 ? `[第${gameState.planetLevel}惑星] ` : "";
            document.getElementById('planet-name').innerText = prefix + evo.name;
        }

        function updateDisplay() {
            document.getElementById('resource-display').innerText = formatNumber(gameState.stardust);
            document.getElementById('sps-display').innerText = formatNumber(getTotalSps());
            
            const bonusText = gameState.aliens > 0 ? `(エイリアン: +${gameState.aliens * 10}%)` : '';
            document.getElementById('bonus-display').innerText = bonusText;

            const prestigeText = gameState.planetLevel > 1 ? `(周回ボーナス: x${Math.pow(5, gameState.planetLevel - 1)})` : '';
            document.getElementById('prestige-display').innerText = prestigeText;
        }

        function updateButtons() {
            gameState.items.forEach(item => {
                const card = document.getElementById(`item-${item.id}`);
                document.getElementById(`cost-${item.id}`).innerText = formatNumber(item.cost);
                document.getElementById(`count-${item.id}`).innerText = item.count;
                
                if (gameState.stardust >= item.cost) card.classList.remove('disabled');
                else card.classList.add('disabled');
            });

            const btnAlien = document.getElementById('btn-alien');
            btnAlien.innerText = `👾 宇宙人を雇う (Cost: ${formatNumber(gameState.alienCost)})`;
            btnAlien.disabled = gameState.stardust < gameState.alienCost;

            // 宇宙創生エンジン（id:10）を1つ以上持っていればプレステージボタンを表示
            const btnPrestige = document.getElementById('btn-prestige');
            if (gameState.items[10].count >= 1) {
                btnPrestige.style.display = "block";
                btnPrestige.disabled = false;
            } else {
                btnPrestige.style.display = "none";
            }
        }

        // プレステージ（強くてニューゲーム）処理
        function prestigeJump() {
            if (confirm("現在の惑星を旅立ち、新たな惑星へ移住しますか？\n\n【注意】資源、施設、宇宙人、歴史は初期化されます。\n【報酬】以降の全生産量が永久に5倍になります！")) {
                gameState.planetLevel++;
                gameState.stardust = 0;
                gameState.currentEvoLevel = 0;
                gameState.aliens = 0;
                gameState.alienCost = 500;
                
                // アイテムのカウントとコストを初期状態（baseCost）にリセット
                gameState.items.forEach(item => {
                    item.count = 0;
                    item.cost = item.baseCost;
                });

                // 画面上のエイリアンを消去
                document.getElementById('alien-container').innerHTML = '';

                applyEvolution(0);
                updateDisplay();
                updateButtons();
                saveGame();
                alert(`第${gameState.planetLevel}惑星へ到達しました！生産量が劇的に増加しています。`);
            }
        }

        function saveGame() {
            const data = {
                stardust: gameState.stardust,
                currentEvoLevel: gameState.currentEvoLevel,
                aliens: gameState.aliens,
                alienCost: gameState.alienCost,
                planetLevel: gameState.planetLevel,
                items: gameState.items.map(i => ({ count: i.count, cost: i.cost }))
            };
            localStorage.setItem('astroEvolutionSave', JSON.stringify(data));
        }

        function openArchive() {
            const overlay = document.getElementById('modal-overlay');
            const list = document.getElementById('lore-list');
            list.innerHTML = '';

            planetEvos.forEach((evo, index) => {
                const entry = document.createElement('div');
                if (index <= gameState.currentEvoLevel) {
                    entry.className = 'lore-entry';
                    entry.style.borderLeftColor = evo.color;
                    entry.innerHTML = `<h4 style="color: ${evo.color}">${evo.loreTitle}</h4><p>${evo.loreDesc}</p>`;
                } else {
                    entry.className = 'lore-entry lore-locked';
                    entry.innerHTML = `<p>❓ 条件未達成（SPS: ${formatNumber(evo.threshold)}で解放）</p>`;
                }
                list.appendChild(entry);
            });
            overlay.style.display = 'flex';
        }

        function closeArchive() { document.getElementById('modal-overlay').style.display = 'none'; }

        loadGame();
        initShop();
        setInterval(update, 100);
        setInterval(saveGame, 10000);
        setInterval(checkRandomEvent, 2000); 
    </script>
</body>
</html>
